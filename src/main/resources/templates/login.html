<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Logística App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: 'Inter', sans-serif; }
        .login-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .login-icon { font-size: 3rem; color: #764ba2; margin-bottom: 20px; }
        .btn-primary { background: #764ba2; border: none; padding: 12px; border-radius: 10px; font-weight: 600; margin-top: 10px; }
        .btn-primary:hover { background: #667eea; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2); border-color: #764ba2; }
    </style>
</head>
<body>

<div class="login-card animate__animated animate__fadeIn">
    <div class="text-center">
        <i class="bi bi-person-circle login-icon"></i>
        <h2 class="fw-bold mb-4">Iniciar Sesión</h2>
    </div>

    <form th:action="@{/login}" method="post">
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            Has cerrado sesión correctamente.
        </div>

        <div class="mb-3">
            <label for="username" class="form-label small fw-bold">Usuario</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Tu usuario" required autofocus>
            </div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label small fw-bold">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Tu contraseña" required>
            </div>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-primary shadow-sm">Entrar</button>
        </div>
    </form>

    <div class="mt-4 text-center small text-muted">
        <p class="mb-0">Para pruebas:</p>
        <code>admin / admin123</code><br>
        <code>operario / operario123</code>
    </div>
</div>

</body>
</html>
