<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error - Logística App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-container { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .error-icon { font-size: 5rem; color: #dc3545; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="error-container shadow">
    <i class="bi bi-exclamation-triangle-fill error-icon"></i>
    <h1 class="display-5 fw-bold" th:text="${errorTitle}">Ups!</h1>
    <p class="lead text-muted mb-4" th:text="${errorMessage}">Ha ocurrido un error inesperado.</p>
    <div class="d-grid gap-2">
        <a href="/" class="btn btn-primary btn-lg">Volver al Inicio</a>
        <a href="/paquetes" class="btn btn-outline-secondary">Ver Paquetes</a>
    </div>
</div>

</body>
</html>
