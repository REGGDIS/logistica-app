<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso Denegado - Logística App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .denied-container { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .denied-icon { font-size: 5rem; color: #ffc107; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="denied-container">
    <i class="bi bi-shield-lock-fill denied-icon"></i>
    <h1 class="display-6 fw-bold">Acceso Denegado</h1>
    <p class="lead text-muted mb-4">No tienes permisos suficientes para acceder a esta sección. Contacta con el administrador si crees que esto es un error.</p>
    <div class="d-grid gap-2">
        <a th:href="@{/}" class="btn btn-primary btn-lg rounded-pill shadow-sm">Volver al Inicio</a>
    </div>
</div>

</body>
</html>
